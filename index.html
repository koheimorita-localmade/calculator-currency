<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>計算機 + 通貨変換</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="計算機">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --text: #fff;
    --text-dim: #8e8e93;
    --btn-num: #333333;
    --btn-num-hover: #444;
    --btn-func: #a5a5a5;
    --btn-func-hover: #b5b5b5;
    --btn-func-text: #000;
    --btn-op: #ff9f0a;
    --btn-op-hover: #ffb340;
    --btn-op-active: #fff;
    --radius: 50%;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 12px;
  }
  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }
  .header h1 {
    font-size: .85rem;
    font-weight: 500;
    color: var(--text-dim);
  }
  .header h1 span {
    font-size: .65rem;
    font-weight: 400;
    margin-left: 4px;
    opacity: .6;
  }

  /* Favorite bar */
  .fav-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    padding: 0 4px;
  }
  .fav-item {
    position: relative;
    display: inline-flex;
    align-items: center;
    transition: transform .15s;
  }
  .fav-item.fav-dragging { opacity: .4; }
  .fav-item.fav-drag-over { transform: scale(1.1); }
  .fav-bar button {
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid #444;
    background: var(--btn-num);
    color: var(--text-dim);
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .fav-bar button:hover { background: var(--btn-num-hover); }
  .fav-bar button.active {
    background: var(--btn-op);
    color: #000;
    border-color: var(--btn-op);
  }
  .fav-bar .fav-add, .fav-bar .fav-edit {
    background: none;
    border: 1px dashed #555;
    color: var(--text-dim);
    font-size: .8rem;
    padding: 5px 8px;
  }
  .fav-bar .fav-edit.editing {
    border-color: var(--btn-op);
    color: var(--btn-op);
  }
  .fav-item .fav-remove {
    display: none;
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ff3b30;
    color: #fff;
    border: none;
    font-size: .65rem;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    padding: 0;
    z-index: 5;
  }
  .fav-bar.editing .fav-item .fav-remove { display: block; }
  .fav-bar.editing .fav-item { cursor: grab; }

  /* Display */
  .display {
    padding: 0 16px 8px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
  }
  .display .expr {
    font-size: .95rem;
    color: var(--text-dim);
    min-height: 1.3em;
    word-break: break-all;
  }
  .display .result-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    width: 100%;
    justify-content: flex-end;
  }
  .display .result {
    font-size: 3.2rem;
    font-weight: 300;
    word-break: break-all;
    line-height: 1.15;
    letter-spacing: -1px;
  }
  .display .base-cur-btn {
    font-size: 1rem;
    font-weight: 600;
    background: var(--btn-num);
    border: 1px solid #555;
    color: var(--btn-op);
    border-radius: 14px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background .15s;
  }
  .display .base-cur-btn:hover { background: var(--btn-num-hover); }

  /* Calculator buttons */
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 0 4px;
  }
  .keys button {
    aspect-ratio: 1;
    font-size: 1.5rem;
    font-weight: 400;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--btn-num);
    color: var(--text);
    transition: background .1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .keys button:active { opacity: .7; }
  .keys button.func {
    background: var(--btn-func);
    color: var(--btn-func-text);
    font-size: 1.3rem;
  }
  .keys button.func:active { background: var(--btn-func-hover); }
  .keys button.op {
    background: var(--btn-op);
    color: #fff;
    font-size: 1.7rem;
  }
  .keys button.op:active { background: var(--btn-op-hover); }
  .keys button.op.active-op {
    background: #fff;
    color: var(--btn-op);
  }

  /* Currency picker modal */
  .cur-picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .cur-picker-overlay.open { display: flex; }
  .cur-picker {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    width: 90%;
    max-width: 360px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cur-picker h3 { font-size: 1rem; font-weight: 600; }
  .cur-picker input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #444;
    background: var(--btn-num);
    color: var(--text);
    font-size: .95rem;
    outline: none;
  }
  .cur-picker-list {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cur-picker-list button {
    text-align: left;
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    background: var(--btn-num);
    color: var(--text);
    font-size: .95rem;
    cursor: pointer;
    transition: background .15s;
  }
  .cur-picker-list button:hover { background: var(--btn-num-hover); }
  .cur-picker-list button.active { background: var(--btn-op); color: #000; }

  /* Currency section */
  .currency-section {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .currency-section h2 {
    font-size: .9rem;
    color: var(--text-dim);
    font-weight: 500;
  }
  .currency-results {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 260px;
    overflow-y: auto;
  }
  .currency-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--btn-num);
    border-radius: 10px;
    padding: 10px 12px;
    transition: opacity .15s, transform .15s;
  }
  .currency-row.base-row {
    background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    border: 1px solid var(--btn-op);
  }
  .currency-row.base-row .val { color: var(--btn-op); }
  .currency-row.dragging { opacity: .4; }
  .currency-row.drag-over {
    transform: scale(1.02);
    box-shadow: 0 0 0 2px var(--btn-op);
  }
  .drag-handle {
    cursor: grab;
    color: var(--text-dim);
    font-size: 1.1rem;
    padding: 0 8px 0 0;
    touch-action: none;
    user-select: none;
    line-height: 1;
  }
  .currency-row .val { font-size: 1rem; font-weight: 600; }
  .currency-row .label { font-size: .75rem; color: var(--text-dim); }
  .currency-row button {
    background: none;
    border: 1px solid #555;
    color: var(--text);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: .78rem;
    cursor: pointer;
    transition: background .15s;
  }
  .currency-row button:hover { background: rgba(255,255,255,.1); }
  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--btn-op);
    color: #000;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: .9rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    z-index: 100;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .rate-info {
    font-size: .7rem;
    color: var(--text-dim);
    text-align: right;
  }
  .add-currency {
    display: flex;
    gap: 8px;
  }
  .add-currency button {
    padding: 8px 14px;
    border-radius: 10px;
    border: none;
    background: var(--btn-op);
    color: #000;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .remove-btn {
    background: none;
    border: none;
    color: #ff3b30;
    cursor: pointer;
    font-size: .9rem;
    padding: 4px 6px;
    margin-left: 4px;
  }

  @media (min-width: 500px) {
    body { align-items: center; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Calculator + Currency <span>v2.0.1</span></h1>
  </div>

  <div class="fav-bar" id="favBar"></div>
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result-row">
      <div class="result" id="result">0</div>
      <button class="base-cur-btn" id="baseCurBtn" onclick="openCurrencyPicker('base')">JPY</button>
    </div>
  </div>

  <div class="keys">
    <button class="func" id="bsBtn" onclick="backspace()" data-long="clearAll">⌫</button>
    <button class="func" id="acBtn" onclick="clearOrAC()">AC</button>
    <button class="func" onclick="inputPercent()">%</button>
    <button class="op" onclick="inputOp('/')">÷</button>

    <button onclick="inputDigit('7')">7</button>
    <button onclick="inputDigit('8')">8</button>
    <button onclick="inputDigit('9')">9</button>
    <button class="op" onclick="inputOp('*')">×</button>

    <button onclick="inputDigit('4')">4</button>
    <button onclick="inputDigit('5')">5</button>
    <button onclick="inputDigit('6')">6</button>
    <button class="op" onclick="inputOp('-')">−</button>

    <button onclick="inputDigit('1')">1</button>
    <button onclick="inputDigit('2')">2</button>
    <button onclick="inputDigit('3')">3</button>
    <button class="op" onclick="inputOp('+')">+</button>

    <button onclick="toggleSign()">+/−</button>
    <button onclick="inputDigit('0')">0</button>
    <button onclick="inputDot()">.</button>
    <button class="op" onclick="calculate()">=</button>
  </div>

  <div class="currency-section">
    <h2>通貨変換</h2>
    <div class="currency-results" id="currencyResults"></div>
    <div class="add-currency">
      <button onclick="openCurrencyPicker('add')" style="flex:1">+ 変換先通貨を追加</button>
    </div>
    <div class="rate-info" id="rateInfo"></div>
  </div>

  <!-- Currency Picker Modal -->
  <div class="cur-picker-overlay" id="curPickerOverlay" onclick="if(event.target===this)closeCurrencyPicker()">
    <div class="cur-picker">
      <h3 id="curPickerTitle">通貨を選択</h3>
      <input type="text" id="curSearchInput" placeholder="通貨名・コードで検索..." oninput="filterCurrencyPicker()">
      <div class="cur-picker-list" id="curPickerList"></div>
    </div>
  </div>
</div>

<div class="copy-toast" id="toast">コピーしました</div>

<script>
// ── Calculator State ──
let current = '0';
let previous = '';
let operator = '';
let shouldReset = false;
let lastResult = null;

const exprEl = document.getElementById('expr');
const resultEl = document.getElementById('result');
const bsBtn = document.getElementById('bsBtn');
const acBtn = document.getElementById('acBtn');

function updateDisplay() {
  resultEl.textContent = formatNumber(current);
  updateFuncButtons();
  convertCurrencies();
}

function updateFuncButtons() {
  // AC/C button: show C when there's input, AC when cleared
  if (current !== '0' || operator || previous) {
    acBtn.textContent = 'C';
  } else {
    acBtn.textContent = 'AC';
  }
}

function formatNumber(str) {
  if (str === '' || str === '-') return str || '0';
  const num = parseFloat(str);
  if (isNaN(num)) return str;
  if (str.includes('.') && str.endsWith('0') && !shouldReset) return str;
  if (str.endsWith('.')) return str;
  if (Number.isInteger(num) && !str.includes('.')) {
    return num.toLocaleString('en-US');
  }
  const parts = str.split('.');
  const intPart = parseInt(parts[0]).toLocaleString('en-US');
  return intPart + '.' + (parts[1] || '');
}

function inputDigit(d) {
  if (shouldReset) { current = ''; shouldReset = false; }
  if (current === '0' && d === '0') return;
  if (current === '0' && d !== '0') { current = d; }
  else { current += d; }
  updateDisplay();
  updateActiveOp('');
}

function inputDot() {
  if (shouldReset) { current = '0'; shouldReset = false; }
  if (!current.includes('.')) current += '.';
  updateDisplay();
}

function inputOp(op) {
  if (operator && !shouldReset) {
    calculate(true);
  }
  previous = current;
  operator = op;
  const opSymbol = { '/': '÷', '*': '×', '-': '−', '+': '+' }[op];
  exprEl.textContent = formatNumber(previous) + ' ' + opSymbol;
  shouldReset = true;
  updateActiveOp(op);
  updateFuncButtons();
}

function updateActiveOp(op) {
  document.querySelectorAll('.keys button.op').forEach(btn => {
    btn.classList.remove('active-op');
  });
  if (op) {
    const symbol = { '/': '÷', '*': '×', '-': '−', '+': '+' }[op];
    document.querySelectorAll('.keys button.op').forEach(btn => {
      if (btn.textContent === symbol) btn.classList.add('active-op');
    });
  }
}

function calculate(chaining) {
  if (!operator || previous === '') return;
  const a = parseFloat(previous);
  const b = parseFloat(current);
  let r;
  switch (operator) {
    case '+': r = a + b; break;
    case '-': r = a - b; break;
    case '*': r = a * b; break;
    case '/': r = b === 0 ? 'Error' : a / b; break;
  }
  if (r === 'Error') {
    current = 'Error';
  } else {
    const rounded = parseFloat(r.toPrecision(12));
    current = String(rounded);
  }
  if (!chaining) {
    const opSymbol = { '/': '÷', '*': '×', '-': '−', '+': '+' }[operator];
    exprEl.textContent = formatNumber(previous) + ' ' + opSymbol + ' ' + formatNumber(String(b));
    operator = '';
    previous = '';
  }
  shouldReset = true;
  lastResult = parseFloat(current);
  updateActiveOp('');
  updateDisplay();
}

// Backspace: tap = delete last digit, long press = AC
function backspace() {
  if (shouldReset || current === 'Error') {
    clearAll();
    return;
  }
  if (current.length > 1) current = current.slice(0, -1);
  else current = '0';
  updateDisplay();
}

// Long press on BS button
let bsLongTimer = null;
bsBtn.addEventListener('touchstart', e => {
  bsLongTimer = setTimeout(() => {
    clearAll();
    bsLongTimer = null;
  }, 500);
}, { passive: true });
bsBtn.addEventListener('touchend', () => {
  if (bsLongTimer) { clearTimeout(bsLongTimer); bsLongTimer = null; }
});
bsBtn.addEventListener('mousedown', () => {
  bsLongTimer = setTimeout(() => {
    clearAll();
    bsLongTimer = null;
  }, 500);
});
bsBtn.addEventListener('mouseup', () => {
  if (bsLongTimer) { clearTimeout(bsLongTimer); bsLongTimer = null; }
});

// C/AC button
function clearOrAC() {
  if (acBtn.textContent === 'C') {
    // C: clear current entry only
    current = '0';
    shouldReset = false;
    updateDisplay();
  } else {
    clearAll();
  }
}

function clearAll() {
  current = '0';
  previous = '';
  operator = '';
  shouldReset = false;
  lastResult = null;
  exprEl.textContent = '';
  updateActiveOp('');
  updateDisplay();
}

function toggleSign() {
  if (current === '0') return;
  current = current.startsWith('-') ? current.slice(1) : '-' + current;
  updateDisplay();
}

function inputPercent() {
  current = String(parseFloat(current) / 100);
  updateDisplay();
}

// ── Keyboard support ──
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
  else if (e.key === '.') inputDot();
  else if (e.key === '+') inputOp('+');
  else if (e.key === '-') inputOp('-');
  else if (e.key === '*') inputOp('*');
  else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
  else if (e.key === 'Enter' || e.key === '=') calculate();
  else if (e.key === 'Escape') clearAll();
  else if (e.key === '%') inputPercent();
  else if (e.key === 'Backspace') backspace();
  else if (/^[a-zA-Z]$/.test(e.key)) switchFavByKey(e.key.toUpperCase());
});

// ── Keyboard currency switch ──
function switchFavByKey(letter) {
  const matches = favBaseCurrencies.filter(c => c.startsWith(letter));
  if (matches.length === 0) return;
  if (matches.length === 1) {
    if (baseCur !== matches[0]) setBaseCurrency(matches[0]);
    return;
  }
  // Toggle: find current in matches, move to next
  const idx = matches.indexOf(baseCur);
  const next = idx === -1 ? 0 : (idx + 1) % matches.length;
  setBaseCurrency(matches[next]);
}

// ── Currency Conversion ──
const POPULAR_CURRENCIES = [
  { code: 'JPY', name: '日本円', symbol: '¥' },
  { code: 'USD', name: '米ドル', symbol: '$' },
  { code: 'EUR', name: 'ユーロ', symbol: '€' },
  { code: 'GBP', name: '英ポンド', symbol: '£' },
  { code: 'CNY', name: '中国元', symbol: '¥' },
  { code: 'KRW', name: '韓国ウォン', symbol: '₩' },
  { code: 'TWD', name: '台湾ドル', symbol: 'NT$' },
  { code: 'THB', name: 'タイバーツ', symbol: '฿' },
  { code: 'AUD', name: '豪ドル', symbol: 'A$' },
  { code: 'CAD', name: 'カナダドル', symbol: 'C$' },
  { code: 'CHF', name: 'スイスフラン', symbol: 'CHF' },
  { code: 'SGD', name: 'シンガポールドル', symbol: 'S$' },
  { code: 'HKD', name: '香港ドル', symbol: 'HK$' },
  { code: 'NZD', name: 'NZドル', symbol: 'NZ$' },
  { code: 'SEK', name: 'スウェーデンクローナ', symbol: 'kr' },
  { code: 'MXN', name: 'メキシコペソ', symbol: 'MX$' },
  { code: 'INR', name: 'インドルピー', symbol: '₹' },
  { code: 'BRL', name: 'ブラジルレアル', symbol: 'R$' },
  { code: 'ZAR', name: '南アフリカランド', symbol: 'R' },
  { code: 'TRY', name: 'トルコリラ', symbol: '₺' },
  { code: 'PHP', name: 'フィリピンペソ', symbol: '₱' },
  { code: 'VND', name: 'ベトナムドン', symbol: '₫' },
  { code: 'AED', name: 'UAEディルハム', symbol: 'د.إ' },
];

let rates = {};
let baseCur = 'JPY';
let targetCurrencies = ['JPY', 'PHP', 'USD', 'EUR', 'GBP', 'CNY', 'KRW'];
let favBaseCurrencies = ['JPY', 'PHP', 'USD', 'EUR'];

const baseCurBtn = document.getElementById('baseCurBtn');
let pickerMode = 'base';

// ── Favorite Base Currency Bar ──
let favEditing = false;
let favDragSrcIdx = null;

function setBaseCurrency(code) {
  baseCur = code;
  baseCurBtn.textContent = code;
  renderFavBar();
  fetchRates();
}

function toggleFavEdit() {
  favEditing = !favEditing;
  renderFavBar();
}

function removeFav(code) {
  if (favBaseCurrencies.length <= 1) return;
  favBaseCurrencies = favBaseCurrencies.filter(c => c !== code);
  if (baseCur === code) setBaseCurrency(favBaseCurrencies[0]);
  renderFavBar();
}

function reorderFav(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const item = favBaseCurrencies.splice(fromIdx, 1)[0];
  favBaseCurrencies.splice(toIdx, 0, item);
  renderFavBar();
}

function renderFavBar() {
  const bar = document.getElementById('favBar');
  bar.innerHTML = '';
  if (favEditing) bar.classList.add('editing');
  else bar.classList.remove('editing');

  favBaseCurrencies.forEach((code, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'fav-item';
    wrapper.dataset.idx = idx;

    const btn = document.createElement('button');
    btn.textContent = code;
    if (code === baseCur) btn.classList.add('active');
    btn.onclick = () => { if (!favEditing) setBaseCurrency(code); };

    const removeBtn = document.createElement('button');
    removeBtn.className = 'fav-remove';
    removeBtn.textContent = '×';
    removeBtn.onclick = e => { e.stopPropagation(); removeFav(code); };

    wrapper.appendChild(btn);
    wrapper.appendChild(removeBtn);

    if (favEditing) {
      wrapper.draggable = true;
      wrapper.addEventListener('dragstart', e => {
        favDragSrcIdx = idx;
        wrapper.classList.add('fav-dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      wrapper.addEventListener('dragend', () => wrapper.classList.remove('fav-dragging'));
      wrapper.addEventListener('dragover', e => { e.preventDefault(); wrapper.classList.add('fav-drag-over'); });
      wrapper.addEventListener('dragleave', () => wrapper.classList.remove('fav-drag-over'));
      wrapper.addEventListener('drop', e => {
        e.preventDefault();
        wrapper.classList.remove('fav-drag-over');
        reorderFav(favDragSrcIdx, idx);
      });
      wrapper.addEventListener('touchstart', e => {
        if (!favEditing) return;
        e.preventDefault();
        favTouchDragStart(idx, wrapper, e.touches[0]);
      }, { passive: false });
    }

    bar.appendChild(wrapper);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'fav-add';
  addBtn.textContent = '+';
  addBtn.onclick = () => openCurrencyPicker('fav');
  bar.appendChild(addBtn);

  const editBtn = document.createElement('button');
  editBtn.className = 'fav-edit' + (favEditing ? ' editing' : '');
  editBtn.textContent = favEditing ? '完了' : '編集';
  editBtn.onclick = toggleFavEdit;
  bar.appendChild(editBtn);
}

// Touch drag for fav bar
let favTouchClone = null, favTouchIdx = null, favTouchEl = null;

function favTouchDragStart(idx, el, touch) {
  favTouchIdx = idx;
  favTouchEl = el;
  favTouchClone = el.cloneNode(true);
  favTouchClone.style.cssText = `
    position:fixed;z-index:300;pointer-events:none;opacity:.85;
    left:${el.getBoundingClientRect().left}px;
    top:${touch.clientY - el.offsetHeight / 2}px;
  `;
  document.body.appendChild(favTouchClone);
  el.classList.add('fav-dragging');
  document.addEventListener('touchmove', favTouchDragMove, { passive: false });
  document.addEventListener('touchend', favTouchDragEnd);
}

function favTouchDragMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  if (favTouchClone) favTouchClone.style.top = (touch.clientY - favTouchClone.offsetHeight / 2) + 'px';
  document.querySelectorAll('.fav-item').forEach(el => el.classList.remove('fav-drag-over'));
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  if (target) {
    const item = target.closest('.fav-item');
    if (item) item.classList.add('fav-drag-over');
  }
}

function favTouchDragEnd(e) {
  document.removeEventListener('touchmove', favTouchDragMove);
  document.removeEventListener('touchend', favTouchDragEnd);
  if (favTouchClone) { favTouchClone.remove(); favTouchClone = null; }
  if (favTouchEl) favTouchEl.classList.remove('fav-dragging');
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  if (target) {
    const item = target.closest('.fav-item');
    if (item && item.dataset.idx !== undefined) {
      reorderFav(favTouchIdx, parseInt(item.dataset.idx));
    }
  }
  document.querySelectorAll('.fav-drag-over').forEach(el => el.classList.remove('fav-drag-over'));
  favTouchIdx = null; favTouchEl = null;
}

function openCurrencyPicker(mode) {
  pickerMode = mode;
  const overlay = document.getElementById('curPickerOverlay');
  const title = document.getElementById('curPickerTitle');
  const input = document.getElementById('curSearchInput');
  title.textContent = mode === 'base' ? '計算元の通貨を選択' : mode === 'fav' ? 'お気に入り通貨を追加/削除' : '変換先通貨を追加';
  input.value = '';
  overlay.classList.add('open');
  input.focus();
  renderCurrencyPicker();
}

function closeCurrencyPicker() {
  document.getElementById('curPickerOverlay').classList.remove('open');
}

function filterCurrencyPicker() {
  renderCurrencyPicker();
}

function renderCurrencyPicker() {
  const query = document.getElementById('curSearchInput').value.toLowerCase();
  const list = document.getElementById('curPickerList');
  list.innerHTML = '';
  POPULAR_CURRENCIES.forEach(c => {
    if (query && !c.code.toLowerCase().includes(query) && !c.name.toLowerCase().includes(query) && !c.symbol.includes(query)) return;
    const btn = document.createElement('button');
    btn.textContent = `${c.symbol} ${c.code} - ${c.name}`;
    if (pickerMode === 'base' && c.code === baseCur) btn.classList.add('active');
    if (pickerMode === 'add' && targetCurrencies.includes(c.code)) btn.classList.add('active');
    if (pickerMode === 'fav' && favBaseCurrencies.includes(c.code)) btn.classList.add('active');
    btn.onclick = () => selectCurrency(c.code);
    list.appendChild(btn);
  });
}

function selectCurrency(code) {
  if (pickerMode === 'base') {
    setBaseCurrency(code);
    closeCurrencyPicker();
  } else if (pickerMode === 'fav') {
    if (favBaseCurrencies.includes(code)) {
      if (favBaseCurrencies.length > 1) {
        favBaseCurrencies = favBaseCurrencies.filter(c => c !== code);
      }
    } else {
      favBaseCurrencies.push(code);
    }
    renderCurrencyPicker();
    renderFavBar();
  } else {
    if (!targetCurrencies.includes(code) && code !== baseCur) {
      targetCurrencies.push(code);
    } else if (targetCurrencies.includes(code)) {
      targetCurrencies = targetCurrencies.filter(c => c !== code);
    }
    renderCurrencyPicker();
    convertCurrencies();
  }
}

function removeTargetCurrency(code) {
  targetCurrencies = targetCurrencies.filter(c => c !== code);
  convertCurrencies();
}

async function fetchRates() {
  try {
    const res = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${baseCur.toLowerCase()}.json`);
    const data = await res.json();
    rates = data[baseCur.toLowerCase()];
    const dateStr = data.date || 'N/A';
    document.getElementById('rateInfo').textContent = `レート更新日: ${dateStr} (自動取得)`;
    convertCurrencies();
  } catch (e) {
    document.getElementById('rateInfo').textContent = 'レート取得に失敗しました。オフラインかもしれません。';
  }
}

function getCurrencyInfo(code) {
  return POPULAR_CURRENCIES.find(c => c.code === code) || { code, name: code, symbol: code };
}

function formatCurrency(amount, code) {
  const info = getCurrencyInfo(code);
  const decimals = ['JPY', 'KRW', 'VND'].includes(code) ? 0 : 2;
  const formatted = amount.toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
  return `${info.symbol}${formatted} ${code}`;
}

function convertCurrencies() {
  const container = document.getElementById('currencyResults');
  const amount = parseFloat(current);
  if (isNaN(amount) || !rates || Object.keys(rates).length === 0) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:.85rem;padding:8px;">数値を入力すると通貨変換されます</div>';
    return;
  }
  container.innerHTML = '';
  const baseRow = document.createElement('div');
  baseRow.className = 'currency-row base-row';
  baseRow.innerHTML = `
    <div>
      <div class="val">${formatCurrency(amount, baseCur)}</div>
      <div class="label">${getCurrencyInfo(baseCur).name}（元の値）</div>
    </div>
    <button onclick="copyText('${formatCurrency(amount, baseCur).replace(/'/g, "\\'")}')">コピー</button>
  `;
  container.appendChild(baseRow);

  targetCurrencies.forEach((code, idx) => {
    if (code === baseCur) return;
    const rate = rates[code.toLowerCase()];
    if (!rate) return;
    const converted = amount * rate;
    const text = formatCurrency(converted, code);
    const row = document.createElement('div');
    row.className = 'currency-row';
    row.draggable = true;
    row.dataset.idx = idx;
    row.innerHTML = `
      <div style="display:flex;align-items:center">
        <span class="drag-handle">☰</span>
        <div>
          <div class="val">${text}</div>
          <div class="label">${getCurrencyInfo(code).name}</div>
        </div>
      </div>
      <div>
        <button onclick="copyText('${text.replace(/'/g, "\\'")}')">コピー</button>
        <button class="remove-btn" onclick="removeTargetCurrency('${code}')" title="削除">✕</button>
      </div>
    `;
    row.addEventListener('dragstart', e => {
      dragSrcIdx = idx;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      reorderCurrency(dragSrcIdx, idx);
    });
    const handle = row.querySelector('.drag-handle');
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      touchDragStart(idx, row, e.touches[0]);
    }, { passive: false });
    container.appendChild(row);
  });
}

// ── Drag & Drop ──
let dragSrcIdx = null;

function reorderCurrency(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const item = targetCurrencies.splice(fromIdx, 1)[0];
  targetCurrencies.splice(toIdx, 0, item);
  convertCurrencies();
}

let touchDragEl = null, touchDragIdx = null, touchClone = null;

function touchDragStart(idx, rowEl, touch) {
  touchDragIdx = idx;
  touchDragEl = rowEl;
  touchClone = rowEl.cloneNode(true);
  touchClone.style.cssText = `
    position:fixed; z-index:300; pointer-events:none;
    width:${rowEl.offsetWidth}px; opacity:.85;
    left:${rowEl.getBoundingClientRect().left}px;
    top:${touch.clientY - rowEl.offsetHeight / 2}px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); border-radius:10px;
  `;
  document.body.appendChild(touchClone);
  rowEl.classList.add('dragging');
  document.addEventListener('touchmove', touchDragMove, { passive: false });
  document.addEventListener('touchend', touchDragEnd);
}

function touchDragMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  if (touchClone) touchClone.style.top = (touch.clientY - touchClone.offsetHeight / 2) + 'px';
  const container = document.getElementById('currencyResults');
  container.querySelectorAll('.currency-row[draggable]').forEach(r => r.classList.remove('drag-over'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el) {
    const row = el.closest('.currency-row[draggable]');
    if (row) row.classList.add('drag-over');
  }
}

function touchDragEnd(e) {
  document.removeEventListener('touchmove', touchDragMove);
  document.removeEventListener('touchend', touchDragEnd);
  if (touchClone) { touchClone.remove(); touchClone = null; }
  if (touchDragEl) touchDragEl.classList.remove('dragging');
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el) {
    const row = el.closest('.currency-row[draggable]');
    if (row && row.dataset.idx !== undefined) {
      reorderCurrency(touchDragIdx, parseInt(row.dataset.idx));
    }
  }
  document.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
  touchDragIdx = null; touchDragEl = null;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = `コピーしました: ${text}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  });
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ── Init ──
renderFavBar();
fetchRates();
</script>
</body>
</html>
